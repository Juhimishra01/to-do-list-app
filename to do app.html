<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fecfef);
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #ff6b9d;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #ff9a9e;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #ff6b9d;
        }
        button {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin-left: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .filters {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: #fecfef;
            color: #c44569;
            border: 2px solid #ff6b9d;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .filter-btn.active {
            background: #ff6b9d;
            color: white;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #fff;
            margin: 10px 0;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s;
        }
        li:hover {
            transform: translateY(-5px);
        }
        li.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .task-text {
            flex: 1;
            margin-left: 10px;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .edit-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            transition: color 0.3s;
        }
        .edit-btn {
            color: #ff6b9d;
        }
        .delete-btn {
            color: #c44569;
        }
        .edit-btn:hover {
            color: #ff9a9e;
        }
        .delete-btn:hover {
            color: #fecfef;
        }
        .priority {
            font-size: 0.8em;
            color: #ff6b9d;
            margin-left: 10px;
        }
        .due-date {
            font-size: 0.8em;
            color: #c44569;
        }
        .search {
            margin-bottom: 20px;
        }
        .search input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ff9a9e;
            border-radius: 25px;
            font-size: 1em;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b9d;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ To-Do List ✨</h1>
        <div class="search">
            <input type="text" id="search" placeholder="Search tasks...">
        </div>
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Add a new task...">
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input type="date" id="due-date">
            <button id="add-btn">Add Task</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <ul id="task-list"></ul>
    </div>
    <div class="notification" id="notification"></div>

    <script>
        const taskInput = document.getElementById('task-input');
        const prioritySelect = document.getElementById('priority');
        const dueDateInput = document.getElementById('due-date');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const searchInput = document.getElementById('search');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const notification = document.getElementById('notification');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        function renderTasks() {
            taskList.innerHTML = '';
            const filteredTasks = tasks.filter(task => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'pending') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return task.text.toLowerCase().includes(searchInput.value.toLowerCase());
            });
            filteredTasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = task.completed ? 'completed' : '';
                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${index})">
                    <span class="task-text">${task.text}</span>
                    <span class="priority">${task.priority}</span>
                    <span class="due-date">${task.dueDate ? new Date(task.dueDate).toLocaleDateString() : ''}</span>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(${index})">✏️</button>
                        <button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({
                    text,
                    priority: prioritySelect.value,
                    dueDate: dueDateInput.value,
                    completed: false
                });
                taskInput.value = '';
                dueDateInput.value = '';
                saveTasks();
                renderTasks();
                showNotification('Task added! 💖');
            }
        }

        function toggleComplete(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function editTask(index) {
            const newText = prompt('Edit task:', tasks[index].text);
            if (newText !== null) {
                tasks[index].text = newText.trim();
                saveTasks();
                renderTasks();
            }
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
            showNotification('Task deleted! 😢');
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
        searchInput.addEventListener('input', renderTasks);
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks();
            });
        });

        renderTasks();
    </script>
</body>
</html>
